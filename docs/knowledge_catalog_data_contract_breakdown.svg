<svg width="100%" viewBox="0 0 1000 760" role="img" style="" xmlns="http://www.w3.org/2000/svg"><title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Knowledge Catalog data contract, full breakdown</title><desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">An Entry Type requires both a schema aspect and a custom DataContract aspect on any entry of that type. The entry itself, orders-team, carries both aspects. The schema aspect is system managed automatically. The DataContract aspect is custom and holds five typed fields: freshness SLA, uptime commitment, breaking change notice period, support contact, and a URL field pointing at a longer written document. That URL field links out to a Cloud Storage bucket holding the actual CONTRACT.md file, which the producer writes and versions in git the same way as their schema. The entry, with all its aspects, is what gets packaged into the Data Product a consumer actually browses and requests access to.</desc>
